<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada | Chateau Pireneus</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#1d3557" />

  <link rel="icon" type="image/png" href="chateau-logo.png" />
  <link rel="shortcut icon" href="chateau-logo.png" />
  <link rel="apple-touch-icon" href="chateau-logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    body{
      margin:0;
      font-family:"Cormorant Garamond", Georgia, serif;
      background:
        radial-gradient(circle at top left, rgba(184,149,95,0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(29,53,87,0.08), transparent 30%),
        linear-gradient(to bottom, #fbfaf7 0%, #f5f1e9 100%);
      color:var(--navy);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 22px;
    }

    .page{
      text-align:center;
      max-width:560px;
    }

    .brand-name{
      font-family:"Gyahegi","Cormorant Garamond",serif;
      font-size:22px;
      letter-spacing:3px;
      text-transform:uppercase;
      color:var(--navy);
      opacity:0.55;
      margin:0 0 52px;
    }

    .code{
      font-family:"Gyahegi","Cormorant Garamond",serif;
      font-size:clamp(80px,18vw,130px);
      line-height:1;
      letter-spacing:4px;
      color:var(--navy);
      margin:0;
      opacity:0.12;
    }

    .orn{
      width:120px;
      height:1px;
      background:linear-gradient(to right, rgba(216,199,161,0), rgba(216,199,161,1), rgba(216,199,161,0));
      margin:28px auto;
    }

    h1{
      font-family:"Cormorant Garamond",serif;
      font-size:clamp(26px,5vw,36px);
      font-weight:600;
      margin:0 0 16px;
      line-height:1.2;
      color:var(--navy);
    }

    p{
      margin:0 0 36px;
      color:rgba(18,28,44,0.65);
      font-size:18px;
      line-height:1.75;
    }

    .actions{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn-primary{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:13px 24px;
      border-radius:14px;
      background:var(--navy);
      color:#fff;
      text-decoration:none;
      font-family:"Cormorant Garamond",serif;
      font-size:15px;
      font-weight:600;
      letter-spacing:0.4px;
      transition:0.22s ease;
      border:2px solid var(--navy);
    }
    .btn-primary:hover{
      background:var(--navy2);
      border-color:var(--navy2);
      transform:translateY(-1px);
    }

    .btn-ghost{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:13px 24px;
      border-radius:14px;
      background:transparent;
      color:var(--navy);
      text-decoration:none;
      font-family:"Cormorant Garamond",serif;
      font-size:15px;
      font-weight:600;
      letter-spacing:0.4px;
      transition:0.22s ease;
      border:2px solid rgba(29,53,87,0.22);
    }
    .btn-ghost:hover{
      background:rgba(29,53,87,0.06);
      transform:translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand-name">Chateau Pireneus</div>

    <p class="code">404</p>

    <div class="orn"></div>

    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido.<br>Veja nossas acomodações ou volte para a página inicial.</p>

    <div class="actions">
      <a href="/" class="btn-primary">Ir para a página inicial</a>
      <a href="/acomodacoes.html" class="btn-ghost">Ver acomodações</a>
    </div>
  </div>
</body>
</html>
