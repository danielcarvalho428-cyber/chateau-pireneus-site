  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #f7f4ef;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 18px;
      padding: 40px 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }

    .reservation-box {
      margin: 24px 0;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f3f3f3;
      font-size: 14px;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 24px;
    }

    .btn {
      display: inline-block;
      min-width: 220px;
      padding: 14px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    .btn-dark {
      background: #1c1c1c;
      color: #fff;
    }

    .btn-light {
      background: #ece7de;
      color: #222;
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pagamento não concluído</h1>

    <p>Sua reserva foi criada, mas o pagamento não foi finalizado.</p>
    <p>Você pode tentar novamente enquanto o hold da reserva ainda estiver válido.</p>

    <div id="reservationBox" class="reservation-box">
      Preparando link de pagamento...
    </div>

    <div class="actions">
      <a id="retryLink" class="btn btn-dark" href="/acomodacoes.html">
        TENTAR PAGAMENTO NOVAMENTE
      </a>

      <a href="/acomodacoes.html" class="btn btn-light">
        VOLTAR PARA ACOMODAÇÕES
      </a>
    </div>

    <div id="statusText" class="status">
      Carregando...
    </div>
  </div>

  <script>
    var reservationBox = document.getElementById("reservationBox");
    var retryLink = document.getElementById("retryLink");
    var statusText = document.getElementById("statusText");

    function getReservationId() {
      var query = window.location.search || "";
      var match = query.match(/[?&]reservation_id=([^&]+)/);
      return match ? decodeURIComponent(match[1]) : "";
    }

    var reservationId = getReservationId();

    if (!reservationId) {
      reservationBox.textContent = "Nenhum código de reserva foi encontrado na URL.";
      retryLink.href = "/acomodacoes.html";
      statusText.textContent = "Página carregada, mas sem reservation_id.";
    } else {
      reservationBox.textContent = "Reserva: " + reservationId;
      retryLink.href = "/booking-success.html?reservation_id=" + encodeURIComponent(reservationId) + "&cancelled=1";
      statusText.textContent = "Página carregada com sucesso.";
    }
  </script>
