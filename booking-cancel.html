<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento não concluído | Chateau Pireneus</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ef;
      color: #2d2d2d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 18px;
      padding: 40px 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background: #fff4e5;
      color: #a26a00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 18px;
      font-weight: bold;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }

    .reservation-box {
      margin: 22px 0;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f5f5f5;
      color: #333;
      font-size: 15px;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 26px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 14px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: #1c1c1c;
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.92;
    }

    .btn-secondary {
      background: #ece7de;
      color: #2d2d2d;
    }

    .btn-secondary:hover {
      opacity: 0.92;
    }

    .note {
      margin-top: 24px;
      font-size: 14px;
      color: #777;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">!</div>

    <h1>Pagamento não concluído</h1>

    <p>
      Sua reserva foi criada, mas o pagamento não foi finalizado.
    </p>

    <p>
      Você pode tentar novamente abaixo sem precisar refazer a reserva.
    </p>

    <div id="reservationBox" class="reservation-box hidden"></div>

    <div class="actions">
      <button id="retryButton" class="btn btn-primary hidden">
        TENTAR PAGAMENTO NOVAMENTE
      </button>

      <a href="/acomodacoes.html" class="btn btn-secondary">
        VOLTAR PARA ACOMODAÇÕES
      </a>
    </div>

    <p class="note">
      Se a reserva expirar antes do pagamento, as datas serão liberadas novamente.
    </p>
  </div>

  <script>
    const SUPABASE_PROJECT_URL = "https://pjxurbtvmzdlpnexfqpd.supabase.co";

    function getReservationId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("reservation_id");
    }

    function showMessage(message) {
      const reservationBox = document.getElementById("reservationBox");
      reservationBox.classList.remove("hidden");
      reservationBox.innerHTML = message;
    }

    function initPage() {
      const reservationId = getReservationId();
      const retryButton = document.getElementById("retryButton");

      if (!reservationId) {
        showMessage("Não foi possível localizar o código da reserva.");
        return;
      }

      showMessage(`<strong>Reserva:</strong> ${reservationId}`);

      retryButton.classList.remove("hidden");

      retryButton.addEventListener("click", function () {
        const retryUrl =
          `${SUPABASE_PROJECT_URL}/functions/v1/checkoutstripe?reservation_id=${encodeURIComponent(reservationId)}`;

        window.location.href = retryUrl;
      });
    }

    initPage();
  </script>
</body>
</html>
