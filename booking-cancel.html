<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento não concluído | Chateau Pireneus</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ef;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 640px;
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
    }

    .id-box {
      margin: 20px 0;
      padding: 12px;
      background: #f2f2f2;
      border-radius: 10px;
      word-break: break-word;
      font-size: 14px;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      border: none;
      cursor: pointer;
      min-width: 220px;
      font-size: 15px;
    }

    .btn-dark {
      background: #1d1d1d;
      color: #fff;
    }

    .btn-light {
      background: #ece7de;
      color: #222;
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Pagamento não concluído</h1>
    <p>Sua reserva foi criada, mas o pagamento não foi finalizado.</p>
    <p>Você pode tentar novamente sem refazer toda a reserva.</p>

    <div id="reservationBox" class="id-box">Carregando reserva...</div>

    <div class="actions">
      <button id="retryButton" class="btn btn-dark">TENTAR PAGAMENTO NOVAMENTE</button>
      <a href="/acomodacoes.html" class="btn btn-light">VOLTAR PARA ACOMODAÇÕES</a>
    </div>

    <div id="statusText" class="status"></div>
  </div>

  <script>
    const SUPABASE_PROJECT_URL = "https://pjxurbtvmzdlpnexfqpd.supabase.co";

    function getReservationId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("reservation_id");
    }

    const reservationId = getReservationId();
    const reservationBox = document.getElementById("reservationBox");
    const retryButton = document.getElementById("retryButton");
    const statusText = document.getElementById("statusText");

    if (!reservationId) {
      reservationBox.textContent = "Nenhum reservation_id foi encontrado na URL.";
      retryButton.disabled = true;
      retryButton.style.opacity = "0.5";
      statusText.textContent = "A página abriu, mas a URL não tem o código da reserva.";
    } else {
      reservationBox.innerHTML = "<strong>Reserva:</strong> " + reservationId;
      statusText.textContent = "Página carregada com sucesso.";

      retryButton.addEventListener("click", function () {
        window.location.href =
          SUPABASE_PROJECT_URL +
          "/functions/v1/checkoutstripe?reservation_id=" +
          encodeURIComponent(reservationId);
      });
    }
  </script>
</body>
</html>
