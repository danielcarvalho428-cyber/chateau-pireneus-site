<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status da Reserva | Chateau Pireneus</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ef;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: #ffffff;
      border-radius: 18px;
      padding: 40px 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }

    .reservation-box {
      margin: 24px 0;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f3f3f3;
      font-size: 14px;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 24px;
    }

    .btn {
      display: inline-block;
      min-width: 220px;
      padding: 14px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    .btn-dark {
      background: #1c1c1c;
      color: #fff;
    }

    .btn-light {
      background: #ece7de;
      color: #222;
    }

    .hidden {
      display: none !important;
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="titleText">Status da Reserva</h1>

    <p id="messageLine1">Estamos processando sua reserva.</p>
    <p id="messageLine2">Aguarde enquanto confirmamos os detalhes.</p>

    <div id="reservationBox" class="reservation-box">
      Carregando reserva...
    </div>

    <div class="actions">
      <a id="retryLink" class="btn btn-dark hidden" href="#">
        TENTAR PAGAMENTO NOVAMENTE
      </a>

      <a href="/acomodacoes.html" class="btn btn-light">
        VOLTAR PARA ACOMODAÇÕES
      </a>
    </div>

    <div id="statusText" class="status">Carregando...</div>
  </div>

  <script>
    (function () {
      var SUPABASE_PROJECT_URL = "https://pjxurbtvmzdlpnexfqpd.supabase.co";

      function getParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name) || "";
      }

      var reservationId = getParam("reservation_id");
      var cancelled = getParam("cancelled");
      var sessionId = getParam("session_id");

      var titleText = document.getElementById("titleText");
      var messageLine1 = document.getElementById("messageLine1");
      var messageLine2 = document.getElementById("messageLine2");
      var reservationBox = document.getElementById("reservationBox");
      var retryLink = document.getElementById("retryLink");
      var statusText = document.getElementById("statusText");

      if (!reservationId) {
        titleText.textContent = "Reserva não localizada";
        messageLine1.textContent = "Não foi possível localizar o código da reserva.";
        messageLine2.textContent = "Volte para as acomodações e tente novamente.";
        reservationBox.textContent = "Nenhum reservation_id encontrado na URL.";
        statusText.textContent = "Página carregada sem reservation_id.";
        return;
      }

      reservationBox.innerHTML = "<strong>Reserva:</strong> " + reservationId;

      if (cancelled === "1") {
        titleText.textContent = "Pagamento não concluído";
        messageLine1.textContent = "Sua reserva foi criada, mas o pagamento não foi finalizado.";
        messageLine2.textContent = "Você pode tentar novamente abaixo sem refazer a reserva.";
        retryLink.classList.remove("hidden");
        retryLink.href =
          SUPABASE_PROJECT_URL +
          "/functions/v1/checkoutstripe?reservation_id=" +
          encodeURIComponent(reservationId);
        statusText.textContent = "Pagamento pendente.";
        return;
      }

      titleText.textContent = "Pagamento concluído";
      messageLine1.textContent = "Seu pagamento foi enviado com sucesso.";
      messageLine2.textContent = "Sua reserva está sendo confirmada pelo sistema.";

      if (sessionId) {
        statusText.textContent = "Sessão Stripe recebida.";
      } else {
        statusText.textContent = "Reserva recebida.";
      }
    })();
  </script>
</body>
</html>
