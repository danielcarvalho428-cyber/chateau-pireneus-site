  <style>
    *{box-sizing:border-box}html{scroll-behavior:smooth}
    :root{
      --navy:#1d3557;--gold:#d8c7a1;--bg:#f7f6f2;--ink:rgba(18,28,44,.92);--muted:rgba(18,28,44,.72);
      --shadow:0 26px 70px rgba(0,0,0,.16);--shadowSoft:0 14px 34px rgba(0,0,0,.10);
      --success:#2f7a4b;--successBg:rgba(47,122,75,.12);--danger:#8e3535;--dangerBg:rgba(181,74,74,.12);
      --info:#355474;--infoBg:rgba(81,109,143,.12);--warn:#8f6c3c;--warnBg:rgba(184,149,95,.16);--max:1180px
    }
    body{margin:0;font-family:"Inter",sans-serif;background:var(--bg);color:var(--navy);overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    @font-face{font-family:"Gyahegi";src:url("Gyahegi.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}
    .hidden{display:none!important}

    .top-header{position:fixed;top:0;left:0;right:0;z-index:12000;padding:14px 22px;transition:.25s;background:rgba(0,0,0,.12);border-bottom:1px solid rgba(255,255,255,.10);backdrop-filter:blur(10px)}
    .top-header.solid{background:rgba(246,241,230,.92);border-bottom:1px solid rgba(29,53,87,.12);box-shadow:0 12px 30px rgba(0,0,0,.08)}
    .top-header-inner{max-width:var(--max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{display:flex;flex-direction:column;gap:2px;color:#fff;transition:color .25s}
    .top-header.solid .brand{color:var(--navy)}
    .brand .line1{font-family:"Cormorant Garamond",serif;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;font-size:12px;opacity:.92}
    .brand .line2{font-family:"Gyahegi","Cormorant Garamond",serif;font-size:18px;font-weight:400;letter-spacing:2.2px;text-transform:uppercase;line-height:1.14}
    .header-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .instagram-btn{width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;border-radius:12px;color:#fff;background:rgba(0,0,0,.20);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(6px);transition:.22s;box-shadow:0 12px 26px rgba(0,0,0,.16)}
    .instagram-btn:hover{transform:translateY(-1px);background:rgba(0,0,0,.28)}
    .instagram-btn svg{width:18px;height:18px;display:block}
    .top-header.solid .instagram-btn{color:var(--navy);background:rgba(29,53,87,.08);border:1px solid rgba(29,53,87,.08);box-shadow:none}
    .top-header.solid .instagram-btn:hover{background:rgba(29,53,87,.12)}
    .account-btn,.reserve-btn,.logout-btn-public,.ghost-btn{
      text-decoration:none;font-weight:900;letter-spacing:1.6px;font-size:11px;padding:10px 16px;border-radius:12px;
      border:1px solid rgba(255,255,255,.14);transition:.22s;white-space:nowrap;font-family:inherit;cursor:pointer
    }
    .reserve-btn{background:rgba(216,199,161,.92);color:#fff;box-shadow:0 18px 40px rgba(0,0,0,.20)}
    .reserve-btn:hover{background:rgba(203,181,140,.98);transform:translateY(-1px);box-shadow:0 22px 52px rgba(0,0,0,.24)}
    .account-btn,.logout-btn-public,.ghost-btn{background:rgba(255,255,255,.12);color:#fff;box-shadow:0 18px 40px rgba(0,0,0,.16);backdrop-filter:blur(6px)}
    .account-btn:hover,.logout-btn-public:hover,.ghost-btn:hover{background:rgba(255,255,255,.18);transform:translateY(-1px)}
    .top-header.solid .account-btn,.top-header.solid .logout-btn-public,.top-header.solid .ghost-btn{color:var(--navy);background:rgba(29,53,87,.08);border:1px solid rgba(29,53,87,.08);box-shadow:none}
    .top-header.solid .account-btn:hover,.top-header.solid .logout-btn-public:hover,.top-header.solid .ghost-btn:hover{background:rgba(29,53,87,.12)}
    .menu-button{font-size:28px;line-height:1;color:#fff;cursor:pointer;user-select:none;padding:10px 12px;border-radius:14px;background:rgba(0,0,0,.20);backdrop-filter:blur(6px);border:0;transition:.22s}
    .top-header.solid .menu-button{color:var(--navy);background:rgba(29,53,87,.08)}
    .menu-button:hover{transform:translateY(-1px);background:rgba(0,0,0,.28)}
    .top-header.solid .menu-button:hover{background:rgba(29,53,87,.12)}

    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.38);opacity:0;pointer-events:none;transition:.25s;z-index:11000}
    .backdrop.open{opacity:1;pointer-events:auto}
    .side-menu{position:fixed;top:0;left:0;width:270px;height:100vh;background:#fff;padding:96px 26px 28px;box-shadow:12px 0 50px rgba(0,0,0,.22);transform:translateX(-100%);transition:.3s ease;z-index:11500;overflow-y:auto}
    .side-menu.open{transform:translateX(0)}
    .side-menu a,.side-menu button{display:block;margin:0 0 16px;color:var(--navy);font-size:15px;letter-spacing:.2px;background:none;border:none;padding:0;font-family:inherit;cursor:pointer;text-align:left;width:100%}
    .side-menu a:hover,.side-menu button:hover{text-decoration:underline}
    .side-menu hr{margin:28px 0;border:none;border-top:1px solid rgba(29,53,87,.12)}

    .hero{
      min-height:92vh;position:relative;background-image:url("hero.jpg.webp");background-size:cover;background-position:center;
      display:flex;align-items:center;justify-content:center;overflow:hidden;padding:136px 22px 88px
    }
    .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.54),rgba(0,0,0,.34) 40%,rgba(0,0,0,.56))}
    .hero::before{content:"";position:absolute;inset:-2px;pointer-events:none;background:radial-gradient(900px 420px at 50% 32%,rgba(216,199,161,.10),transparent 60%);opacity:.95}
    .hero-shell{position:relative;z-index:3;width:100%;max-width:var(--max);margin:0 auto;display:grid;grid-template-columns:1.03fr .97fr;gap:30px;align-items:center}
    .hero-copy{color:#fff;text-align:left;opacity:0;transform:translateY(18px);animation:heroIn 1.2s ease forwards}
    .hero-kicker{font-family:"Cormorant Garamond",serif;font-weight:600;letter-spacing:2px;text-transform:uppercase;font-size:14px;margin-bottom:12px;opacity:.95}
    .hero-title{margin:0;font-family:"Gyahegi","Cormorant Garamond",serif;font-weight:400;font-size:clamp(34px,5.5vw,58px);letter-spacing:2px;text-transform:uppercase;line-height:1.24;text-shadow:0 12px 40px rgba(0,0,0,.55)}
    .hero-text{margin:18px 0 0;max-width:640px;font-family:"Cormorant Garamond",serif;font-weight:500;font-size:21px;line-height:1.7;text-shadow:0 10px 28px rgba(0,0,0,.45);opacity:.98}
    .hero-links{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
    .hero-card{
      position:relative;z-index:3;background:linear-gradient(135deg,rgba(255,255,255,.80),rgba(255,255,255,.62));border:1px solid rgba(255,255,255,.30);
      border-radius:28px;box-shadow:var(--shadow);padding:28px 24px 24px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      opacity:0;transform:translateY(18px);animation:heroIn 1.2s ease forwards .12s;animation-fill-mode:forwards;text-align:left
    }
    @keyframes heroIn{to{opacity:1;transform:translateY(0)}}
    .card-eyebrow{display:block;font-family:"Cormorant Garamond",serif;font-weight:700;font-size:18px;color:rgba(29,53,87,.76);letter-spacing:.4px;margin-bottom:8px}
    .card-title{margin:0;font-family:"Gyahegi","Cormorant Garamond",serif;font-weight:400;font-size:32px;letter-spacing:1.4px;text-transform:uppercase;color:var(--navy);line-height:1.28}
    .card-subtitle{margin:12px 0 0;color:var(--muted);line-height:1.8;font-size:15px}
    .orn{width:150px;height:1px;background:linear-gradient(to right,rgba(216,199,161,0),rgba(216,199,161,1),rgba(216,199,161,0));margin:14px 0 0}
    .hero-benefits{margin-top:18px;display:grid;gap:10px}
    .hero-benefit{background:rgba(255,255,255,.58);border:1px solid rgba(29,53,87,.08);border-radius:18px;padding:14px 15px}
    .hero-benefit strong{display:block;font-size:11px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:rgba(29,53,87,.60);margin-bottom:7px}
    .hero-benefit span{display:block;color:var(--ink);font-size:15px;font-weight:600;line-height:1.6}

    .section{
      padding:74px 0;background:
        radial-gradient(900px 280px at 8% 18%,rgba(216,199,161,.08),transparent 58%),
        radial-gradient(720px 240px at 92% 82%,rgba(29,53,87,.05),transparent 62%),
        linear-gradient(to bottom,#fbfaf7 0%,#f8f6f1 100%);
      border-top:1px solid rgba(29,53,87,.08)
    }
    .wrap{max-width:var(--max);margin:0 auto;padding:0 22px}
    .booking-layout{display:grid;grid-template-columns:1.04fr .96fr;gap:24px;align-items:start}
    .panel{background:rgba(255,255,255,.78);border:1px solid rgba(29,53,87,.10);border-radius:24px;box-shadow:var(--shadowSoft);padding:24px 22px}
    .panel-title{margin:0;font-family:"Gyahegi","Cormorant Garamond",serif;font-weight:400;font-size:32px;letter-spacing:1.4px;text-transform:uppercase;color:var(--navy);line-height:1.2}
    .panel-subtitle{margin:10px 0 0;color:var(--muted);font-size:15px;line-height:1.8;max-width:820px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr
