<script>
  const { createClient } = supabase

  const supabaseClient = createClient(
    "https://pjxurbtvmzdlpnexfqpd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqeHVyYnR2bXpkbHBuZXhmcXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzQwNTQsImV4cCI6MjA4ODI1MDA1NH0.wE7E41NWa59-b9U0qs9_KlRH2SDTaOORX8VcTfVqV0A"
  )

  async function loadRooms() {
    const { data, error } = await supabaseClient
      .from("rooms")
      .select("id, name")
      .eq("active", true)
      .order("id", { ascending: true })

    if (error) {
      alert(error.message)
      return
    }

    const roomSelect = document.getElementById("room_id")
    roomSelect.innerHTML = '<option value="">Selecione</option>' + (data || []).map(room => `
      <option value="${room.id}">${room.name}</option>
    `).join("")
  }

  document.getElementById("bookingForm").addEventListener("submit", async (e) => {
    e.preventDefault()

    const submitBtn = e.target.querySelector('button[type="submit"]')
    submitBtn.disabled = true
    submitBtn.textContent = "Processando..."

    try {
      const room_id = Number(document.getElementById("room_id").value)
      const check_in = document.getElementById("check_in").value
      const check_out = document.getElementById("check_out").value
      const guests = Number(document.getElementById("guests").value)
      const special_requests = document.getElementById("special_requests").value
      const room_name = document.getElementById("room_id").selectedOptions[0]?.textContent || ""

      if (!room_id) {
        alert("Selecione uma suíte.")
        submitBtn.disabled = false
        submitBtn.textContent = "Confirmar solicitação"
        return
      }

      if (!check_in || !check_out) {
        alert("Informe check-in e check-out.")
        submitBtn.disabled = false
        submitBtn.textContent = "Confirmar solicitação"
        return
      }

      if (check_out <= check_in) {
        alert("O check-out deve ser depois do check-in.")
        submitBtn.disabled = false
        submitBtn.textContent = "Confirmar solicitação"
        return
      }

      const { data: userData, error: userError } = await supabaseClient.auth.getUser()

      if (userError || !userData.user) {
        alert("Faça login ou crie sua conta para concluir a reserva.")
        window.location.href = "login.html"
        return
      }

      const currentUser = userData.user

      const { data: reservationId, error: bookingError } = await supabaseClient.rpc("create_booking_and_hold_dates", {
        p_user_id: currentUser.id,
        p_room_id: room_id,
        p_check_in: check_in,
        p_check_out: check_out,
        p_guests: guests,
        p_room_type: room_name,
        p_special_requests: special_requests || null
      })

      if (bookingError) {
        alert(bookingError.message)
        submitBtn.disabled = false
        submitBtn.textContent = "Confirmar solicitação"
        return
      }

      const { data: stripeData, error: stripeError } = await supabaseClient.functions.invoke("stripe-checkout", {
        body: { reservation_id: reservationId }
      })

      if (stripeError) {
        alert("Erro ao iniciar pagamento: " + stripeError.message)
        submitBtn.disabled = false
        submitBtn.textContent = "Confirmar solicitação"
        return
      }

      if (!stripeData?.checkout_url) {
        alert("Checkout Stripe não retornou URL.")
        submitBtn.disabled = false
        submitBtn.textContent = "Confirmar solicitação"
        return
      }

      window.location.href = stripeData.checkout_url
    } catch (err) {
      console.error(err)
      alert("Erro inesperado ao processar a reserva.")
      submitBtn.disabled = false
      submitBtn.textContent = "Confirmar solicitação"
    }
  })

  loadRooms()
</script>
