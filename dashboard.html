<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Hóspede</title>
</head>
<body>

  <h2>Área do Hóspede</h2>

  <p id="welcome"></p>
  <p id="user-email"></p>
  <p id="user-phone"></p>

  <hr>

  <h3>Solicitar reserva</h3>

  <form id="reservation-form">
    <label for="check_in">Check-in</label>
    <br>
    <input type="date" id="check_in" required>
    <br><br>

    <label for="check_out">Check-out</label>
    <br>
    <input type="date" id="check_out" required>
    <br><br>

    <label for="guests">Número de hóspedes</label>
    <br>
    <input type="number" id="guests" min="1" required>
    <br><br>

    <label for="room_type">Tipo de quarto</label>
    <br>
    <input type="text" id="room_type" placeholder="Ex: Suíte Master">
    <br><br>

    <label for="special_requests">Pedidos especiais</label>
    <br>
    <textarea id="special_requests" placeholder="Ex: cama extra, decoração romântica"></textarea>
    <br><br>

    <button type="submit">Enviar solicitação</button>
  </form>

  <hr>

  <h3>Minhas reservas</h3>
  <div id="reservations-list">
    <p>Nenhuma reserva encontrada.</p>
  </div>

  <br>
  <button id="logout-btn">Sair</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const { createClient } = supabase

    const supabaseClient = createClient(
      "https://pjxurbtvmzdlpnexfqpd.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqeHVyYnR2bXpkbHBuZXhmcXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzQwNTQsImV4cCI6MjA4ODI1MDA1NH0.wE7E41NWa59-b9U0qs9_KlRH2SDTaOORX8VcTfVqV0A"
    )

    let currentUser = null

    async function loadProfile() {
      const { data: userData, error: userError } = await supabaseClient.auth.getUser()

      if (userError || !userData.user) {
        window.location.href = "login.html"
        return
      }

      currentUser = userData.user

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("full_name, phone")
        .eq("id", currentUser.id)
        .single()

      if (profileError) {
        alert(profileError.message)
        return
      }

      document.getElementById("welcome").textContent = "Bem-vindo, " + profile.full_name
      document.getElementById("user-email").textContent = "Email: " + currentUser.email
      document.getElementById("user-phone").textContent = "Telefone: " + profile.phone
    }

    async function loadReservations() {
      if (!currentUser) return

      const { data, error } = await supabaseClient
        .from("reservations")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("id", { ascending: false })

      if (error) {
        alert(error.message)
        return
      }

      const container = document.getElementById("reservations-list")

      if (!data || data.length === 0) {
        container.innerHTML = "<p>Nenhuma reserva encontrada.</p>"
        return
      }

      container.innerHTML = data.map(reservation => `
        <div style="border:1px solid #ccc; padding:12px; margin-bottom:12px;">
          <p><strong>Check-in:</strong> ${reservation.check_in || ""}</p>
          <p><strong>Check-out:</strong> ${reservation.check_out || ""}</p>
          <p><strong>Hóspedes:</strong> ${reservation.guests || ""}</p>
          <p><strong>Quarto:</strong> ${reservation.room_type || ""}</p>
          <p><strong>Pedidos especiais:</strong> ${reservation.special_requests || "Nenhum"}</p>
          <p><strong>Status:</strong> ${reservation.status || "pending"}</p>
        </div>
      `).join("")
    }

    document.getElementById("reservation-form").addEventListener("submit", async (e) => {
      e.preventDefault()

      if (!currentUser) {
        alert("Usuário não encontrado.")
        return
      }

      const check_in = document.getElementById("check_in").value
      const check_out = document.getElementById("check_out").value
      const guests = document.getElementById("guests").value
      const room_type = document.getElementById("room_type").value
      const special_requests = document.getElementById("special_requests").value

      const { error } = await supabaseClient
        .from("reservations")
        .insert([
          {
            user_id: currentUser.id,
            check_in,
            check_out,
            guests,
            room_type,
            special_requests
          }
        ])

      if (error) {
        alert(error.message)
      } else {
        alert("Solicitação de reserva enviada com sucesso!")
        document.getElementById("reservation-form").reset()
        loadReservations()
      }
    })

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut()
      window.location.href = "login.html"
    })

    async function init() {
      await loadProfile()
      await loadReservations()
    }

    init()
  </script>

</body>
</html>
