<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chateau Pireneus</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Georgia, serif;
background:#f5efe6;
color:#1d3557;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
background-image:url("hero.jpg.webp");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
background-attachment:fixed;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

/* CONTACT BAR */

.contact-bar{
position:absolute;
top:0;
left:0;
width:100%;
padding:12px 40px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
z-index:50;
font-size:14px;
}

.contact-left span{
margin-right:28px;
}

.contact-bar a{
color:white;
text-decoration:none;
}

.contact-bar i{
margin-right:8px;
}

.contact-right a{
font-size:20px;
color:white;
}

/* HAMBURGER */

.menu-button{
position:fixed;
top:80px;
left:25px;
font-size:32px;
color:white;
cursor:pointer;
z-index:5000;
}

/* MENU */

.side-menu{
position:fixed;
top:0;
left:0;
width:220px;
height:100vh;
background:white;
padding:100px 40px;
box-shadow:5px 0 30px rgba(0,0,0,0.15);
transform:translateX(-100%);
transition:0.3s;
z-index:6000;
}

.side-menu a{
display:block;
margin-bottom:22px;
text-decoration:none;
color:#1d3557;
font-size:17px;
}

.side-menu hr{
margin:50px 0;
border:none;
border-top:1px solid #ddd;
}

/* HERO TEXT */

.hero-content{
position:relative;
z-index:10;
color:white;
font-family:'Cormorant Garamond', serif;
opacity:0;
transform:translateY(40px);
animation:heroFade 1.6s ease forwards;
}

@keyframes heroFade{
to{
opacity:1;
transform:translateY(0);
}
}

.hero-title span{
display:block;
font-size:80px;
letter-spacing:3px;
text-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.hero-slogan{
margin-top:20px;
font-size:24px;
}

/* BUTTON */

.button{
display:inline-block;
margin-top:35px;
padding:16px 50px;
background:#d8c7a1;
color:white;
text-decoration:none;
font-weight:bold;
letter-spacing:2px;
}

/* WELCOME */

.section{
padding:40px 10%;
display:flex;
align-items:center;
justify-content:center;
gap:60px;
background:#efe6d7;
}

/* SUITES */

.suites{
padding:80px 20px;
background:white;
text-align:center;
}

.carousel{
position:relative;
max-width:1300px;
margin:auto;
overflow:hidden;
}

.carousel-track{
display:flex;
transition:transform 0.5s ease;
}

.suite-card{
min-width:36%;
padding:25px;
box-sizing:border-box;
}

.card{
background:white;
padding:25px;
box-shadow:0 20px 45px rgba(0,0,0,0.12);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.room-button{
margin-top:15px;
padding:12px 30px;
background:#d8c7a1;
color:white;
text-decoration:none;
display:inline-block;
}

/* ARROWS */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
width:45px;
height:45px;
background:#d8c7a1;
color:#1d3557;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
border-radius:50%;
}

.arrow-left{ left:15px; }
.arrow-right{ right:15px; }

</style>

</head>

<body>

<div class="hero">

<div class="contact-bar">

<div class="contact-left">

<span>
<a href="mailto:chateaupireneus@gmail.com">
<i class="fa-solid fa-envelope"></i> chateaupireneus@gmail.com
</a>
</span>

<span>
<a href="https://maps.google.com/?q=Pousada+Chateau+Pireneus+Pirenopolis" target="_blank">
<i class="fa-solid fa-location-dot"></i> Pirenópolis • Goiás
</a>
</span>

<span>
<a href="https://wa.me/5562998167654">
<i class="fa-brands fa-whatsapp"></i> WhatsApp
</a>
</span>

</div>

<div class="contact-right">

<a href="https://instagram.com/chateaupireneus" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>

</div>

</div>

<div class="menu-button" onclick="toggleMenu()">☰</div>

<div class="side-menu" id="sideMenu">

<a href="#">A pousada</a>
<a href="#suites">Acomodações</a>
<a href="#">Reservas</a>
<a href="#">Conheça Piri</a>

<hr>

<a href="#">Login</a>
<a href="#">Criar Conta</a>
<a href="#">Entre em contato</a>
<a href="#">Mapa e Localização</a>
<a href="#">Políticas da Pousada</a>

</div>

<div class="hero-content">

<h1 class="hero-title">
<span>Chateau</span>
<span>Pireneus</span>
</h1>

<p class="hero-slogan">
Uma experiência única e pitoresca
</p>

<a href="booking.html" class="button">
RESERVAR AGORA
</a>

</div>

</div>

<script>

function toggleMenu(){
let menu = document.getElementById("sideMenu");

if(menu.style.transform === "translateX(0px)"){
menu.style.transform = "translateX(-100%)";
}else{
menu.style.transform = "translateX(0)";
}
}

</script>

</body>
</html>
