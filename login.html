<script>
  const { createClient } = supabase

  const supabaseClient = createClient(
    "https://pjxurbtvmzdlpnexfqpd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqeHVyYnR2bXpkbHBuZXhmcXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzQwNTQsImV4cCI6MjA4ODI1MDA1NH0.wE7E41NWa59-b9U0qs9_KlRH2SDTaOORX8VcTfVqV0A"
  )

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault()

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    })

    if (error) {
      alert(error.message)
      return
    }

    const user = data.user

    const { data: adminRows, error: adminError } = await supabaseClient
      .from("admins")
      .select("id")
      .eq("id", user.id)

    if (adminError) {
      alert(adminError.message)
      return
    }

    if (adminRows && adminRows.length > 0) {
      window.location.href = "admin.html"
    } else {
      window.location.href = "dashboard.html"
    }
  })
</script>
