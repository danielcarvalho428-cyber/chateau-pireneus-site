<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta</title>
</head>
<body>

  <h2>Criar conta</h2>

  <form id="register-form">
    <input type="email" id="email" placeholder="Email" required>
    <br><br>

    <input type="password" id="password" placeholder="Senha" required>
    <br><br>

    <button type="submit">Cadastrar</button>
  </form>

  <p>
    Já tem conta?
    <a href="login.html">Entrar</a>
  </p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const { createClient } = supabase

    const supabaseClient = createClient(
      "https://pjxurbtvmzdlpnexfqpd.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqeHVyYnR2bXpkbHBuZXhmcXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzQwNTQsImV4cCI6MjA4ODI1MDA1NH0.wE7E41NWa59-b9U0qs9_KlRH2SDTaOORX8VcTfVqV0A"
    )

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault()

      const email = document.getElementById("email").value
      const password = document.getElementById("password").value

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password
      })

      if (error) {
        alert(error.message)
      } else {
        alert("Conta criada com sucesso! Verifique seu email se a confirmação estiver ativada.")
        window.location.href = "login.html"
      }
    })
  </script>

</body>
</html>
