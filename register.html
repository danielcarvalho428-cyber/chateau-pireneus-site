<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta</title>
</head>
<body>

  <h2>Criar conta</h2>

  <form id="register-form">
    <input type="text" id="full_name" placeholder="Nome completo" required>
    <br><br>

    <input type="text" id="phone" placeholder="Telefone" required>
    <br><br>

    <input type="email" id="email" placeholder="Email" required>
    <br><br>

    <input type="password" id="password" placeholder="Senha" required>
    <br><br>

    <button type="submit">Cadastrar</button>
  </form>

  <p>
    Já tem conta?
    <a href="login.html">Entrar</a>
  </p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const { createClient } = supabase

    const supabaseClient = createClient(
      "https://pjxurbtvmzdlpnexfqpd.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqeHVyYnR2bXpkbHBuZXhmcXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzQwNTQsImV4cCI6MjA4ODI1MDA1NH0.wE7E41NWa59-b9U0qs9_KlRH2SDTaOORX8VcTfVqV0A"
    )

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault()

      const full_name = document.getElementById("full_name").value
      const phone = document.getElementById("phone").value
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password
      })

      if (error) {
        alert(error.message)
        return
      }

      const user = data.user

      if (user) {
        const { error: profileError } = await supabaseClient
          .from("profiles")
          .insert([
            {
              id: user.id,
              full_name,
              phone
            }
          ])

        if (profileError) {
          alert(profileError.message)
          return
        }
      }

      alert("Conta criada com sucesso!")
      window.location.href = "login.html"
    })
  </script>

</body>
</html>
