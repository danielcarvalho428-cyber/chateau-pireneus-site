<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suíte • Chateau Pireneus</title>

  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding-top:92px;
      font-family:Georgia, serif;
      background:#f6f1e6;
      color:#1d3557;
    }

    :root{
      --blue:#1d3557;
      --beige:#d8c7a1;
      --beige-dark:#cbb58c;
      --shadow:0 20px 45px rgba(0,0,0,0.12);
    }

    @font-face{
      font-family:"Gyahegi";
      src:url("Gyahegi.otf") format("opentype");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    .top-header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:12000;
      padding:14px 22px;
      transition:background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      background:rgba(0,0,0,0.12);
      border-bottom:1px solid rgba(255,255,255,0.10);
      backdrop-filter:blur(10px);
    }

    .top-header.solid{
      background:rgba(246,241,230,0.92);
      border-bottom:1px solid rgba(29,53,87,0.12);
      box-shadow:0 12px 30px rgba(0,0,0,0.08);
    }

    .top-header-inner{
      max-width:1180px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:2px;
      text-decoration:none;
      color:#fff;
      transition:color 0.25s ease;
    }

    .top-header.solid .brand{
      color:#1d3557;
    }

    .brand .line1{
      font-family:"Cormorant Garamond", serif;
      font-weight:600;
      letter-spacing:1.4px;
      text-transform:uppercase;
      font-size:12px;
      opacity:0.92;
    }

    .brand .line2{
      font-family:"Gyahegi","Cormorant Garamond", serif;
      font-weight:400;
      letter-spacing:2px;
      text-transform:uppercase;
      font-size:18px;
      line-height:1;
    }

    .header-actions{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .instagram-btn{
      width:40px;
      height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      text-decoration:none;
      color:#fff;
      background:rgba(0,0,0,0.20);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(6px);
      transition:0.22s ease;
      box-shadow:0 12px 26px rgba(0,0,0,0.16);
    }

    .instagram-btn:hover{
      transform:translateY(-1px);
      background:rgba(0,0,0,0.28);
    }

    .instagram-btn svg{
      width:18px;
      height:18px;
      display:block;
    }

    .top-header.solid .instagram-btn{
      color:#1d3557;
      background:rgba(29,53,87,0.08);
      border:1px solid rgba(29,53,87,0.08);
      box-shadow:none;
    }

    .top-header.solid .instagram-btn:hover{
      background:rgba(29,53,87,0.12);
    }

    .menu-button{
      font-size:28px;
      line-height:1;
      color:#fff;
      cursor:pointer;
      user-select:none;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(0,0,0,0.20);
      backdrop-filter:blur(6px);
      border:0;
      transition:0.22s ease;
    }

    .top-header.solid .menu-button{
      color:#1d3557;
      background:rgba(29,53,87,0.08);
    }

    .menu-button:hover{
      transform:translateY(-1px);
      background:rgba(0,0,0,0.28);
    }

    .top-header.solid .menu-button:hover{
      background:rgba(29,53,87,0.12);
    }

    .backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.38);
      opacity:0;
      pointer-events:none;
      transition:0.25s;
      z-index:11000;
    }

    .backdrop.open{
      opacity:1;
      pointer-events:auto;
    }

    .side-menu{
      position:fixed;
      top:0;
      left:0;
      width:270px;
      height:100vh;
      background:#fff;
      padding:96px 26px 28px;
      box-shadow:12px 0 50px rgba(0,0,0,0.22);
      transform:translateX(-100%);
      transition:0.3s ease;
      z-index:11500;
    }

    .side-menu.open{
      transform:translateX(0);
    }

    .side-menu a{
      display:block;
      margin:0 0 16px;
      text-decoration:none;
      color:#1d3557;
      font-size:15px;
      letter-spacing:0.2px;
    }

    .side-menu a:hover{
      text-decoration:underline;
    }

    .side-menu hr{
      margin:28px 0;
      border:none;
      border-top:1px solid rgba(29,53,87,0.12);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:28px 18px 60px;
      display:grid;
      grid-template-columns:minmax(0, 1fr) 340px;
      gap:26px;
      align-items:start;
    }

    aside{
      min-width:0;
    }

    .carousel-box{
      position:relative;
      width:100%;
    }

    .hero-img{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      display:block;
      background:#eee;
      border-radius:0;
      box-shadow:var(--shadow);
    }

    .img-arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:46px;
      height:46px;
      border-radius:50%;
      background:rgba(216,199,161,0.95);
      color:var(--blue);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      cursor:pointer;
      user-select:none;
      box-shadow:0 18px 40px rgba(0,0,0,0.20);
      transition:0.2s ease;
    }

    .img-arrow:hover{
      background:#fff;
      transform:translateY(-50%) scale(1.04);
    }

    .img-arrow.left{ left:12px; }
    .img-arrow.right{ right:12px; }

    .dots{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:rgba(29,53,87,0.22);
      cursor:pointer;
      transition:0.25s ease;
    }

    .dot.active{
      width:28px;
      background:rgba(216,199,161,0.98);
      transform:none;
    }

    .info{
      padding:0;
      min-width:0;
    }

    body.room-cavalhadas .info{
      max-width:280px;
    }

    .room-subtitle{
      color:var(--beige-dark);
      font-size:14px;
      letter-spacing:0.8px;
      text-transform:lowercase;
      margin:0 0 4px;
    }

    .room-title{
      margin:0;
      font-family:"Gyahegi", "Cormorant Garamond", serif;
      font-weight:400;
      font-size:32px;
      letter-spacing:0.6px;
      color:var(--blue);
      white-space:nowrap;
    }

    .gold-rule{
      width:160px;
      height:1px;
      background:linear-gradient(to right, rgba(216,199,161,0.0), rgba(216,199,161,1), rgba(216,199,161,0.0));
      margin:14px 0 18px;
    }

    .subtitle{
      margin:0 0 18px;
      color:#2b2b2b;
      line-height:1.7;
      font-size:15px;
    }

    .section-title{
      margin:18px 0 10px;
      font-size:14px;
      letter-spacing:0.8px;
      text-transform:uppercase;
      opacity:0.85;
    }

    ul{
      margin:0;
      padding:0;
      list-style:none;
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:10px 28px;
      color:#333;
      font-size:14.5px;
    }

    ul li{
      position:relative;
      padding-left:18px;
      line-height:1.7;
    }

    ul li::before{
      content:"✦";
      position:absolute;
      left:0;
      top:0;
      color:var(--beige-dark);
      font-size:12px;
    }

    .capacity{
      margin-top:14px;
      font-weight:700;
      color:var(--blue);
      font-size:14.5px;
    }

    .cta{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-weight:800;
      letter-spacing:1px;
      border-radius:12px;
      padding:12px 16px;
      transition:0.2s ease;
      user-select:none;
    }

    .btn.primary{
      background:var(--beige);
      color:#fff;
    }

    .btn.primary:hover{
      background:var(--beige-dark);
      transform:translateY(-1px);
      box-shadow:0 0 18px rgba(216,199,161,0.55);
    }

    .btn.outline{
      background:transparent;
      border:2px solid var(--beige-dark);
      color:var(--blue);
    }

    .btn.outline:hover{
      background:var(--beige);
      border-color:var(--beige);
      color:#fff;
      transform:translateY(-1px);
      box-shadow:0 0 18px rgba(216,199,161,0.45);
    }

    .error{
      max-width:1100px;
      margin:18px auto 0;
      padding:12px 18px;
      color:#7a1f2b;
      background:rgba(122,31,43,0.08);
      border:1px solid rgba(122,31,43,0.18);
      border-radius:12px;
      display:none;
    }

    @media (max-width: 980px){
      .wrap{
        grid-template-columns:1fr;
      }

      ul{
        grid-template-columns:1fr;
      }

      .room-title{
        white-space:normal;
      }

      body.room-cavalhadas .info{
        max-width:none;
      }
    }

    @media (max-width: 768px){
      body{
        padding-top:84px;
      }

      .top-header{
        padding:12px 16px;
      }

      .brand .line1{
        font-size:11px;
      }

      .brand .line2{
        font-size:16px;
      }

      .header-actions{
        gap:10px;
      }

      .instagram-btn{
        width:38px;
        height:38px;
      }

      .menu-button{
        font-size:26px;
        padding:9px 11px;
      }
    }
  </style>
</head>

<body>
  <div class="backdrop" id="backdrop" onclick="toggleMenu(false)"></div>

  <nav class="side-menu" id="sideMenu" aria-label="Menu">
    <a href="index.html#top" onclick="toggleMenu(false)">Home</a>
    <a href="index.html#welcome" onclick="toggleMenu(false)">A pousada</a>
    <a href="index.html#suites" onclick="toggleMenu(false)">Acomodações</a>
    <a href="index.html#piri" onclick="toggleMenu(false)">Conheça Piri</a>

    <hr>

    <a href="login.html" onclick="toggleMenu(false)">Login / Criar Conta</a>
    <a href="https://wa.me/5562998167654" target="_blank" onclick="toggleMenu(false)">Entre em contato</a>
    <a href="https://maps.google.com/?q=Rua+Tupinamb%C3%A1s+Quadra+09+Lote+16+Piren%C3%B3polis+GO" target="_blank" onclick="toggleMenu(false)">Mapa e Localização</a>
    <a href="policies.html" onclick="toggleMenu(false)">Políticas da Pousada</a>
  </nav>

  <header class="top-header" id="topHeader">
    <div class="top-header-inner">
      <a class="brand" href="index.html#top" aria-label="Chateau Pireneus">
        <span class="line1">Pousada</span>
        <span class="line2">Chateau Pireneus</span>
      </a>

      <div class="header-actions">
        <a class="instagram-btn" href="https://instagram.com/" target="_blank" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3.25" y="3.25" width="17.5" height="17.5" rx="5.2" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="17.4" cy="6.6" r="1.2" fill="currentColor"/>
          </svg>
        </a>

        <button class="menu-button" aria-label="Abrir menu" onclick="toggleMenu()">☰</button>
      </div>
    </div>
  </header>

  <div id="errBox" class="error"></div>

  <main class="wrap">
    <section aria-label="Galeria da suíte">
      <div class="carousel-box">
        <img id="heroImg" class="hero-img" src="public/suites/divino/divino1.jpeg" alt="Foto da suíte">
        <div class="img-arrow left" id="prevBtn" aria-label="Foto anterior">‹</div>
        <div class="img-arrow right" id="nextBtn" aria-label="Próxima foto">›</div>
      </div>

      <div class="dots" id="dots" aria-label="Indicadores do carrossel"></div>
    </section>

    <aside>
      <div class="info">
        <p class="room-subtitle" id="roomSub">suíte padrão com tv</p>
        <h1 class="room-title" id="roomName">Suíte</h1>
        <div class="gold-rule" aria-hidden="true"></div>

        <p class="subtitle" id="roomDesc">Carregando informações da suíte…</p>

        <div class="section-title">Comodidades</div>
        <ul id="amenities"></ul>

        <div class="capacity" id="capacityLine">Capacidade: —</div>

        <div class="cta">
          <a class="btn primary" href="booking.html">RESERVAR</a>
          <a id="waBtn" class="btn outline" href="https://wa.me/5562998167654" target="_blank" rel="noopener">WHATSAPP</a>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const topHeader = document.getElementById("topHeader");

    function onScrollHeader(){
      const y = window.scrollY || document.documentElement.scrollTop;
      topHeader.classList.toggle("solid", y > 40);
    }

    window.addEventListener("scroll", onScrollHeader);
    onScrollHeader();

    function toggleMenu(forceOpen){
      const menu = document.getElementById("sideMenu");
      const backdrop = document.getElementById("backdrop");
      const isOpen = menu.classList.contains("open");
      const open = (forceOpen === true) || (forceOpen === undefined && !isOpen);

      if(open){
        menu.classList.add("open");
        backdrop.classList.add("open");
      }else{
        menu.classList.remove("open");
        backdrop.classList.remove("open");
      }
    }

    (function () {
      const ROOMS = {
        divino: {
          name: "Suíte do Divino",
          subtitle: "suíte padrão com Tv",
          desc: "Acomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
          photos: [
            "public/suites/divino/divino1.jpeg",
            "public/suites/divino/divino2.jpeg",
            "public/suites/divino/divino3.jpeg",
            "public/suites/divino/redes4.jpeg"
          ],
          amenities: [
            "Cama Queen",
            "Enxoval 200 fios",
            "Cortina blackout",
            "Arara de roupas",
            "Smart Tv",
            "Frigobar",
            "Ar-condicionado",
            "Wi-Fi",
            "Banheiro privativo",
            "Varanda&nbsp;privativa&nbsp;com&nbsp;rede"
          ],
          capacity: "Capacidade: 2 hóspedes"
        },

        cavalhadas: {
          name: "Suíte das Cavalhadas",
          subtitle: "suíte padrão com Tv",
          desc: "Acomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
          photos: [
            "public/suites/cavalhadas/cavalhadas1.jpeg",
            "public/suites/cavalhadas/cavalhadas2.jpeg",
            "public/suites/cavalhadas/cavalhadas3.jpeg",
            "public/suites/cavalhadas/redes4.jpeg"
          ],
          amenities: [
            "Cama Queen",
            "Enxoval 200 fios",
            "Cortina blackout",
            "Arara de roupas",
            "Smart Tv",
            "Frigobar",
            "Ar-condicionado",
            "Wi-Fi",
            "Banheiro privativo",
            "Varanda&nbsp;privativa&nbsp;com&nbsp;rede"
          ],
          capacity: "Capacidade: 2 hóspedes"
        },

        rosario: {
          name: "Suíte do Rosário",
          subtitle: "suíte padrão com Tv",
          desc: "Acomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
          photos: [
            "public/suites/rosario/rosario1.jpeg",
            "public/suites/rosario/rosario2.jpeg",
            "public/suites/rosario/rosario3.jpeg",
            "public/suites/rosario/redes4.jpeg"
          ],
          amenities: [
            "Cama Queen",
            "Enxoval 200 fios",
            "Cortina blackout",
            "Arara de roupas",
            "TV",
            "Frigobar",
            "Ar-condicionado",
            "Wi-Fi",
            "Banheiro privativo",
            "Varanda&nbsp;privativa&nbsp;com&nbsp;rede"
          ],
          capacity: "Capacidade: 2 hóspedes"
        },

        aurora: {
          name: "Suíte Aurora",
          subtitle: "suíte padrão com Tv",
          desc: "Acomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
          photos: [
            "public/suites/aurora/aurora1.jpeg",
            "public/suites/aurora/aurora2.jpeg",
            "public/suites/aurora/aurora3.jpeg",
            "public/suites/aurora/redes4.jpeg"
          ],
          amenities: [
            "Cama Queen",
            "Enxoval 200 fios",
            "Cortina blackout",
            "Arara de roupas",
            "Smart Tv",
            "Frigobar",
            "Ar-condicionado",
            "Wi-Fi",
            "Banheiro privativo",
            "Varanda&nbsp;privativa&nbsp;com&nbsp;rede"
          ],
          capacity: "Capacidade: 2 hóspedes"
        },

        bonfim: {
          name: "Suíte do Bonfim",
          subtitle: "suíte padrão sem Tv",
          desc: "Acomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
          photos: [
            "public/suites/bonfim/bonfim1.jpeg",
            "public/suites/bonfim/bonfim2.jpeg",
            "public/suites/bonfim/bonfim3.jpeg",
            "public/suites/bonfim/redesbonfim4.jpeg"
          ],
          amenities: [
            "Cama Queen",
            "Enxoval 200 fios",
            "Cortina blackout",
            "Arara de roupas",
            "Frigobar",
            "Ar-condicionado",
            "Wi-Fi",
            "Banheiro privativo",
            "Varanda&nbsp;privativa&nbsp;com&nbsp;rede"
          ],
          capacity: "Capacidade: 2 hóspedes"
        }
      };

      const errBox = document.getElementById("errBox");
      const showError = (msg) => {
        errBox.style.display = "block";
        errBox.textContent = msg;
      };

      const params = new URLSearchParams(location.search);
      const key = (params.get("room") || "divino").toLowerCase().trim();
      const room = ROOMS[key];

      if (key === "cavalhadas") {
        document.body.classList.add("room-cavalhadas");
      }

      if (!room){
        showError("Suíte inválida. Volte e selecione uma acomodação novamente.");
        return;
      }

      document.title = room.name + " • Chateau Pireneus";

      document.getElementById("roomSub").textContent = room.subtitle;
      document.getElementById("roomName").textContent = room.name;
      document.getElementById("roomDesc").textContent = room.desc;

      document.getElementById("amenities").innerHTML =
        room.amenities.map(x => "<li>" + x + "</li>").join("");

      document.getElementById("capacityLine").textContent = room.capacity;

      const waBtn = document.getElementById("waBtn");
      const msg = encodeURIComponent("Olá! Tenho interesse na " + room.name + ". Pode me enviar disponibilidade e valores?");
      waBtn.href = "https://wa.me/5562998167654?text=" + msg;

      const heroImg = document.getElementById("heroImg");
      const dotsWrap = document.getElementById("dots");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");

      let i = 0;
      let timer = null;

      function renderDots(){
        dotsWrap.innerHTML = room.photos.map((_, idx) => (
          '<div class="dot" data-i="' + idx + '" aria-label="Ir para foto ' + (idx + 1) + '"></div>'
        )).join("");
      }

      function setActive(idx){
        i = idx;
        heroImg.src = room.photos[i];
        heroImg.alt = "Foto da " + room.name + " (" + (i + 1) + "/" + room.photos.length + ")";

        Array.from(dotsWrap.querySelectorAll(".dot")).forEach((d, di) => {
          d.classList.toggle("active", di === i);
        });
      }

      function next(){
        const n = room.photos.length;
        setActive((i + 1) % n);
      }

      function prev(){
        const n = room.photos.length;
        setActive((i - 1 + n) % n);
      }

      function restartTimer(){
        if(timer) clearInterval(timer);
        timer = setInterval(next, 4500);
      }

      renderDots();
      setActive(0);
      restartTimer();

      nextBtn.addEventListener("click", () => { next(); restartTimer(); });
      prevBtn.addEventListener("click", () => { prev(); restartTimer(); });

      dotsWrap.addEventListener("click", (e) => {
        const dot = e.target.closest(".dot");
        if(!dot) return;
        setActive(Number(dot.dataset.i));
        restartTimer();
      });
    })();
  </script>
</body>
</html>
