  (function () {
    const ROOMS = {
      divino: {
        name: "Suíte do Divino",
        desc: "(suíte padrão com Tv)\n\nAcomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
        photos: ["public/suites/divino/divino1.jpeg"],

          "Smart Tv",

          "Wi-Fi",
          "Banheiro privativo",
          "Varanda privativa com rede"
        ],
        details: ["Capacidade: 2 hóspedes"]
      },

      cavalhadas: {
        name: "Suíte das Cavalhadas",
        desc: "(suíte padrão com Tv)\n\nAcomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
        photos: ["public/suites/cavalhadas/cavalhadas1.jpeg"],
        amenities: [
          "Cama Queen",
          "Enxoval 200 fios",
          "Cortina blackout",
          "Arara de roupas",
          "Smart Tv",
          "Frigobar",
          "Ar-condicionado",
          "Wi-Fi",
          "Banheiro privativo",
          "Varanda privativa com rede"
        ],
        details: ["Capacidade: 2 hóspedes"]
      },

      rosario: {
        name: "Suíte do Rosário",
        desc: "(suíte padrão com Tv)\n\nAcomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
        photos: ["public/suites/rosario/rosario1.jpeg"],
        amenities: [
          "Cama Queen",
          "Enxoval 200 fios",
          "Cortina blackout",
          "Arara de roupas",
          "TV",
          "Frigobar",
          "Ar-condicionado",
          "Wi-Fi",
          "Banheiro privativo",
          "Varanda privativa com rede"
        ],
        details: ["Capacidade: 2 hóspedes"]
      },

      aurora: {
        name: "Suíte Aurora",
        desc: "(suíte padrão com Tv)\n\nAcomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
        photos: ["public/suites/aurora/aurora1.jpeg"],
        amenities: [
          "Cama Queen",
          "Enxoval 200 fios",
          "Cortina blackout",
          "Arara de roupas",
          "Smart Tv",
          "Frigobar",
          "Ar-condicionado",
          "Wi-Fi",
          "Banheiro privativo",
          "Varanda privativa com rede"
        ],
        details: ["Capacidade: 2 hóspedes"]
      },

      bonfim: {
        name: "Suíte do Bonfim",
        desc: "(suíte padrão sem Tv)\n\nAcomodação aconchegante e bem localizada, perfeita para uma estadia romântica com conforto e tranquilidade!",
        photos: ["public/suites/bonfim/bonfim1.jpeg"],
        amenities: [
          "Cama Queen",
          "Enxoval 200 fios",
          "Cortina blackout",
          "Arara de roupas",
          "Frigobar",
          "Ar-condicionado",
          "Wi-Fi",
          "Banheiro privativo",
          "Varanda privativa com rede"
        ],
        details: ["Capacidade: 2 hóspedes"]
      }
    };

    const errBox = document.getElementById("errBox");
    function showError(msg){
      errBox.style.display = "block";
      errBox.textContent = msg;
    }

    const params = new URLSearchParams(location.search);
    const key = (params.get("room") || "divino").toLowerCase();
    const room = ROOMS[key];

    if (!room){
      showError("Suíte inválida. Volte e selecione uma acomodação novamente.");
      return;
    }

    document.title = room.name + " • Chateau Pireneus";
    document.getElementById("roomName").textContent = room.name;

    // Convert \n\n into line breaks nicely
    document.getElementById("roomDesc").innerHTML = room.desc.replace(/\n/g, "<br>");

    document.getElementById("amenities").innerHTML =
      room.amenities.map(x => "<li>" + x + "</li>").join("");

    document.getElementById("details").innerHTML =
      room.details.map(x => "<li>" + x + "</li>").join("");

    const waBtn = document.getElementById("waBtn");
    const msg = encodeURIComponent("Olá! Tenho interesse na " + room.name + ". Pode me enviar disponibilidade e valores?");
    waBtn.href = "https://wa.me/5562998167654?text=" + msg;

    const heroImg = document.getElementById("heroImg");
    const thumbs = document.getElementById("thumbs");

    function setActive(i){
      heroImg.src = room.photos[i];
      heroImg.alt = "Foto da " + room.name;
      Array.from(thumbs.querySelectorAll("img")).forEach((img, idx)=>{
        img.classList.toggle("active", idx === i);
      });
    }

    thumbs.innerHTML = room.photos.map((src, i)=>(
      '<img src="' + src + '" alt="Miniatura ' + (i+1) + '" data-i="' + i + '">'
    )).join("");

    thumbs.addEventListener("click", (e)=>{
      const img = e.target.closest("img");
      if(!img) return;
      setActive(Number(img.dataset.i));
    });

    setActive(0);
  })();
</script>
