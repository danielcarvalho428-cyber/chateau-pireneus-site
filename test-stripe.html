<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Stripe Checkout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    pre {
      background: #f6f6f6;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 20px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ok {
      color: green;
      font-weight: bold;
    }

    .err {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Test Stripe Checkout</h2>

  <div class="box">
    <label for="reservation_id">Reservation ID</label>
    <input
      type="text"
      id="reservation_id"
      placeholder="Cole aqui o UUID da reserva held"
    />

    <button id="pay-btn">Criar Checkout Stripe</button>

    <div id="status" style="margin-top:16px;"></div>
    <pre id="result"></pre>
  </div>

  <script>
    const SUPABASE_URL = "https://pjxurbtvmzdlpnexfqpd.supabase.co"
    const SUPABASE_ANON_KEY = "sb_publishable_P4NaItGPbofham7Uvz-3OQ_B-MkJVBZ"

    const statusEl = document.getElementById("status")
    const resultEl = document.getElementById("result")
    const payBtn = document.getElementById("pay-btn")

    function setStatus(message, isError = false) {
      statusEl.className = isError ? "err" : "ok"
      statusEl.textContent = message
    }

    payBtn.addEventListener("click", async () => {
      const reservation_id = document.getElementById("reservation_id").value.trim()

      statusEl.textContent = ""
      resultEl.textContent = ""

      if (!reservation_id) {
        setStatus("Cole o reservation_id primeiro.", true)
        return
      }

      payBtn.disabled = true
      payBtn.textContent = "Criando checkout..."

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/stripe-checkout`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ reservation_id })
        })

        const text = await response.text()

        let data = null
        try {
          data = JSON.parse(text)
        } catch {
          data = { raw_response: text }
        }

        console.log("status:", response.status)
        console.log("response:", data)
        resultEl.textContent = JSON.stringify(data, null, 2)

        if (!response.ok) {
          setStatus(`Erro HTTP ${response.status}`, true)
          return
        }

        if (data?.checkout_url) {
          setStatus("Checkout criado com sucesso. Redirecionando...")
          window.location.href = data.checkout_url
          return
        }

        setStatus("A função respondeu, mas não retornou checkout_url.", true)
      } catch (err) {
        console.error(err)
        setStatus("Erro inesperado ao chamar a função.", true)
        resultEl.textContent = JSON.stringify(
          { message: err?.message || "Erro desconhecido" },
          null,
          2
        )
      } finally {
        payBtn.disabled = false
        payBtn.textContent = "Criar Checkout Stripe"
      }
    })
  </script>
</body>
</html>
