<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Stripe Checkout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 20px;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Test Stripe Checkout</h2>

  <div class="box">
    <form
      action="https://pjxurbtvmzdlpnexfqpd.supabase.co/functions/v1/stripe-checkout"
      method="POST"
    >
      <label for="reservation_id">Reservation ID</label>
      <input
        type="text"
        id="reservation_id"
        name="reservation_id"
        placeholder="Cole aqui o UUID da reserva held"
        required
      />

      <button type="submit">Criar Checkout Stripe</button>
    </form>
  </div>
</body>
</html>
